name: Weekly price refresh

# Sources fresh GPU prices into catalog.json (the single source of truth), validates
# the catalog (schema-guardian — a drifted catalog must NOT ship), regenerates the
# pickers, and commits. Runs on GitHub's runners, so it works with no local machine on.

on:
  schedule:
    - cron: '17 9 * * 1'   # Mondays 09:17 UTC
  workflow_dispatch: {}      # manual "Run workflow" button

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Source prices into catalog.json
        run: python3 scripts/update-prices.py

      - name: Validate catalog (schema-guardian — fail on id/enum/vocab drift)
        run: python3 validate.py

      - name: Regenerate pickers
        run: bash generate-all.sh

      - name: Commit if anything changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Weekly price refresh ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No price changes this week."
          fi
